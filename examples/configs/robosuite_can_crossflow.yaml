experiment:
  name: robosuite-can-crossflow
  seed: 0
  runs_root: runs

simulator:
  backend: robosuite
  task: PickPlaceCan
  robot: Panda
  controller: BASIC
  control_freq: 20
  horizon: 400
  reward_shaping: true
  has_renderer: false
  has_offscreen_renderer: true
  use_camera_obs: true
  camera_names: [robot0_eye_in_hand, agentview]
  camera_width: 84
  camera_height: 84
  env_kwargs: {}

task:
  object_name: can

robot:
  name: Panda
  action_dim: 7
  image_key: observation.images.right_wrist_0_rgb
  image_keys: [observation.images.right_wrist_0_rgb]
  proprio_keys: [observation.state.eef_pos, observation.state.eef_quat, observation.state.tool]
  state_keys: [observation.state.eef_pos, observation.state.eef_quat, observation.state.tool, observation.state.object]

data:
  format: lerobot_hf
  observation_mode: image
  lerobot_repo_id: robotgeneralist/robosuite_can_ph
  lerobot_action_key: action
  lerobot_episode_index_key: episode_index
  lerobot_local_files_only: false
  lerobot_video_backend: pyav
  precomputed_features_path: null
  precomputed_feature_key: vision_feat
  fallback_image_hw: [84, 84]
  n_demos: 200
  chunk_size: 16
  action_stats_path: action_stats.json
  filter_min_episode_length: 24
  filter_min_action_std: 0.01
  filter_min_state_delta: 0.02
  filter_state_delta_key: observation.state.object
  filter_drop_nan: true

vision:
  backend: timm
  model_name: vit_base_patch16_dinov3.lvd1689m
  pretrained: true
  batch_size: 64
  image_size: 224
  output_path: data/features/can_crossflow_features
  use_runtime_extractor: true
  hf_model_id: null
  local_files_only: false

model:
  name: mini_pi0_crossflow
  action_dim: 7
  prop_dim: 23
  obs_mode: image
  vision_dim: 0
  chunk_size: 16
  cond_dim: 256
  d_model: 384
  nhead: 6
  nlayers: 4
  num_timestep_buckets: 1000
  noise_beta_alpha: 1.5
  noise_beta_beta: 1.0
  noise_s: 0.999
  state_dropout_prob: 0.05
  state_additive_noise_scale: 0.01
  add_action_pos_embed: true
  use_context_layernorm: true
  vision_token_grid_size: 4
  use_dit_adaln: true

train:
  epochs: 100
  batch_size: 256
  lr: 0.0001
  lr_scheduler: cosine
  scheduler_t_max: 200
  scheduler_eta_min: 0.0
  scheduler_step_size: 50
  scheduler_gamma: 0.5
  weight_decay: 0.0001
  num_workers: -1
  persistent_workers: true
  save_best: true
  save_best_min_delta: 0.0001
  grad_clip_norm: 1.0
  val_ratio: 0.1
  ema_decay: 0.999
  checkpoint_use_ema: true
  model_print_depth: 3
  ckpt_dir: checkpoints
  device: auto

eval:
  checkpoint: checkpoints/best.pt
  action_stats_path: action_stats.json
  n_episodes: 50
  execute_steps: 4
  n_flow_steps: 10
  max_steps: 450
  strict_parity: true
  action_smoothing_alpha: 0.0
  action_scale: null
  failure_reward_threshold: 0.2
  stability_warmup_steps: 40
  stability_warmup_execute_steps: 2
  stability_warmup_n_flow_steps: 15
  stability_warmup_action_smoothing_alpha: 0.2
  verbose: true
  log_every_episodes: 1
  record: false
  record_grid: true
  grid_size: 3
  grid_fps: 20
  grid_width: 256
  grid_height: 256
  cube_xy: null
  cube_xy_range: null
  cube_z: null
  cube_yaw_deg: null
  run_dir: null
  device: auto

deploy:
  mode: sim
  checkpoint: checkpoints/best.pt
  action_stats_path: action_stats.json
  execute_steps: 4
  n_flow_steps: 10
  max_steps: 500
  strict_parity: true
  action_smoothing_alpha: 0.0
  action_scale: null
  stability_warmup_steps: 40
  stability_warmup_execute_steps: 2
  stability_warmup_n_flow_steps: 15
  stability_warmup_action_smoothing_alpha: 0.2
  record_path: null
  device: auto
