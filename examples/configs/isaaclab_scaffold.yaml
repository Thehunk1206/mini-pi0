experiment:
  name: isaaclab-scaffold
  seed: 0
  runs_root: runs

simulator:
  backend: isaaclab
  task: LiftCube
  robot: franka
  controller: operational_space
  control_freq: 60
  horizon: 500
  reward_shaping: true
  has_renderer: false
  has_offscreen_renderer: true
  use_camera_obs: true
  camera_names: [front]
  camera_width: 84
  camera_height: 84
  env_kwargs: {}

task:
  object_name: cube

robot:
  name: franka
  action_dim: 7
  image_key: agentview_image
  proprio_keys: [robot0_eef_pos, robot0_eef_quat, robot0_gripper_qpos]
  state_keys: [robot0_eef_pos, robot0_eef_quat, robot0_gripper_qpos]

data:
  format: robomimic_hdf5
  robomimic_hdf5: data/robomimic/lift/ph/low_dim_v15.hdf5
  robomimic_data_group: data
  fallback_image_hw: [84, 84]
  n_demos: 10
  chunk_size: 16
  action_stats_path: action_stats.json

model:
  name: mini_pi0_fm
  action_dim: 7
  chunk_size: 16
  cond_dim: 256
  d_model: 256
  nhead: 4
  nlayers: 4

train:
  epochs: 2
  batch_size: 16
  lr: 0.0001
  weight_decay: 0.0001
  num_workers: 0
  persistent_workers: false
  save_best: true
  save_best_min_delta: 0.0001
  grad_clip_norm: 1.0
  model_print_depth: 2
  ckpt_dir: checkpoints
  device: cpu

eval:
  checkpoint: checkpoints/best.pt
  action_stats_path: action_stats.json
  n_episodes: 2
  execute_steps: 4
  n_flow_steps: 5
  max_steps: 100
  record: false
  record_grid: false
  grid_size: 3
  grid_fps: 20
  grid_width: 256
  grid_height: 256
  cube_xy: null
  cube_xy_range: null
  cube_z: null
  cube_yaw_deg: null
  device: cpu

deploy:
  mode: sim
  checkpoint: checkpoints/best.pt
  action_stats_path: action_stats.json
  execute_steps: 4
  n_flow_steps: 5
  max_steps: 100
  record_path: null
  device: cpu
