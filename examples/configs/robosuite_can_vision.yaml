experiment:
  name: robosuite-can-fm-vision
  seed: 0
  runs_root: runs

simulator:
  backend: robosuite
  task: PickPlaceCan
  robot: Panda
  controller: BASIC
  control_freq: 20
  horizon: 400
  reward_shaping: true
  has_renderer: false
  has_offscreen_renderer: true
  use_camera_obs: true
  camera_names: [robot0_eye_in_hand, agentview]
  camera_width: 84
  camera_height: 84
  env_kwargs: {}

task:
  object_name: can

robot:
  name: Panda
  action_dim: 7
  image_key: observation.images.right_wrist_0_rgb
  proprio_keys: [observation.state.eef_pos, observation.state.eef_quat, observation.state.tool]
  state_keys: [observation.state.eef_pos, observation.state.eef_quat, observation.state.tool]

data:
  format: lerobot_hf
  observation_mode: image
  lerobot_repo_id: robotgeneralist/robosuite_can_ph
  lerobot_action_key: action
  lerobot_episode_index_key: episode_index
  lerobot_local_files_only: false
  lerobot_video_backend: pyav
  precomputed_features_path: data/features/can_dinov2_vits14.npz
  precomputed_feature_key: vision_feat
  fallback_image_hw: [84, 84]
  n_demos: 200
  chunk_size: 16
  action_stats_path: action_stats.json

vision:
  backend: timm
  model_name: vit_small_patch14_dinov2.lvd142m
  pretrained: true
  batch_size: 64
  image_size: 224
  output_path: data/features/can_dinov2_vits14.npz
  use_runtime_extractor: true
  hf_model_id: null
  local_files_only: false

model:
  name: mini_pi0_fm
  action_dim: 7
  prop_dim: 9
  obs_mode: image
  vision_dim: 0
  chunk_size: 16
  cond_dim: 256
  d_model: 384
  nhead: 6
  nlayers: 6

train:
  epochs: 200
  batch_size: 256
  lr: 0.00005
  lr_scheduler: null
  scheduler_t_max: 200
  scheduler_eta_min: 0.0
  scheduler_step_size: 50
  scheduler_gamma: 0.5
  weight_decay: 0.0001
  num_workers: -1
  persistent_workers: true
  save_best: true
  save_best_min_delta: 0.0001
  grad_clip_norm: 1.0
  model_print_depth: 3
  ckpt_dir: checkpoints
  device: auto

eval:
  checkpoint: checkpoints/best.pt
  action_stats_path: action_stats.json
  n_episodes: 100
  execute_steps: 4
  n_flow_steps: 10
  max_steps: 450
  record: false
  record_grid: true
  grid_size: 3
  grid_fps: 24
  grid_width: 256
  grid_height: 256
  cube_xy: null
  cube_xy_range: null
  cube_z: null
  cube_yaw_deg: null
  plot_path: eval_metrics.png
  device: auto

deploy:
  mode: sim
  checkpoint: checkpoints/best.pt
  action_stats_path: action_stats.json
  execute_steps: 4
  n_flow_steps: 10
  max_steps: 500
  record_path: null
  device: auto
