experiment:
  name: maniskill3-multiobject-tray-minipi05
  seed: 42
  runs_root: runs

simulator:
  backend: maniskill3
  task: MiniPi0MultiObjectTray-v1
  robot: panda
  controller: pd_ee_delta_pose
  control_freq: 20
  horizon: 1000
  reward_shaping: true
  has_renderer: false
  has_offscreen_renderer: true
  use_camera_obs: true
  camera_names: [base_camera, hand_camera]
  camera_width: 256
  camera_height: 256
  env_kwargs:
    obs_mode: rgbd
    reward_mode: dense
    control_mode: pd_ee_delta_pose
    scripted_control_mode: pd_ee_delta_pose
    render_backend: gpu
    sim_backend: auto
    object_count_min: 2
    object_count_max: 4
    robot_init_qpos_noise: 0.0
    object_types: [cube, sphere, cone]
    # Left side of robot in table frame (+y).
    tray_center: [0.05, 0.28, 0.006]
    tray_size_xy: [0.22, 0.22]
    tray_wall_thickness: 0.008
    tray_wall_height: 0.035
    # Right side source bowl in table frame (-y).
    bowl_center: [0.05, -0.28, 0.006]
    bowl_inner_radius: 0.11
    bowl_table_z_offset: 0.02
    bowl_pose_quat: [1.0, 0.0, 0.0, 0.0]
    bowl_spawn_plane_offset: 0.006
    bowl_spawn_height: 0.0
    source_bowl_collision: false
    source_bowl_containment: true
    source_bowl_wall_segments: 16
    source_bowl_wall_thickness: 0.008
    source_bowl_wall_height: 0.04
    source_bowl_wall_radius_offset: 0.025
    scripted_grasp_assist: false
    grasp_assist_z_offset: -0.04
    # Force actual sensor outputs to 256x256 for dataset collection.
    sensor_width: 256
    sensor_height: 256
    # Optional: preview/render camera resolution for recordings.
    render_width: 256
    render_height: 256
    reset_settle_steps: 18
    tray_z_tol: 0.03
    tray_place_min_z: 0.012
    tray_place_max_z: 0.14
    settle_steps_required: 3
    settle_speed_threshold: 0.03
    lift_height_threshold: 0.06
    # Active object spawn now uses in-bowl sampling.
    spawn_min: [-0.10, -0.22]
    spawn_max: [0.10, 0.22]
    domain_randomization:
      enabled: true
      profile: conservative
      camera:
        enabled: true
        base_pos_jitter: [0.015, 0.015, 0.010]
        base_target_jitter: [0.015, 0.015, 0.010]
        hand_pos_jitter: [0.004, 0.004, 0.004]
        fov_jitter_deg: 4.0
      lighting:
        enabled: true
        ambient_range: [0.25, 0.65]
        directional_intensity_range: [0.6, 1.4]
        directional_yaw_range_deg: [-25, 25]
      visual:
        enabled: true
        object_color_jitter: 0.35
        tray_color_jitter: 0.12
        bowl_color_jitter: 0.10
        table_color_jitter: 0.10
      objects:
        enabled: true
        randomize_active_slots: true
        randomize_spawn_yaw: true
        spawn_radius_jitter: 0.008
      placement:
        enabled: true
        target_xy_margin: 0.045
        target_z: 0.065
        min_target_separation: 0.055
      physics:
        enabled: true
        object_mass_scale_range: [0.85, 1.15]
        object_friction_range: [0.7, 1.3]
        object_restitution_range: [0.0, 0.05]
    reward:
      progress: 8.0
      place_bonus: 4.0
      terminal_success: 12.0
      terminal_timeout: 2.0
      shaping_eef_to_obj: 0.25
      shaping_obj_to_tray: 0.35
      shaping_lift: 0.15
      penalty_drop: 0.8
      penalty_collision: 0.1
      penalty_out_of_workspace: 0.6
      step_cost: 0.01

task:
  object_name: multi_object

robot:
  name: panda
  action_dim: 7
  image_key: base_image
  image_keys: [base_image, hand_image]
  proprio_keys: [robot0_eef_pos, robot0_eef_quat, robot0_gripper_qpos]
  state_keys:
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qpos

# Example training data path from collector command.
data:
  format: robomimic_hdf5
  robomimic_hdf5: data/robomimic/custom/maniskill3_multiobject/ph/dataset_600.hdf5
  robomimic_data_group: data
  fallback_image_hw: [256, 256]
  n_demos: 600
  chunk_size: 16
  action_stats_path: data/robomimic/custom/maniskill3_multiobject/ph/dataset_600_action_stats.json


dataset_collection:
  output_hdf5: data/robomimic/custom/maniskill3_multiobject/ph/dataset_600.hdf5
  total_episodes: 600
  num_envs: 128
  max_steps: 1000
  only_success: true
  reject_long_episodes: true
  mix:
    core: 0.5
    recovery: 0.25
    suboptimal: 0.25
  difficulty: balanced

model:
  name: mini_pi05
  action_dim: 7
  prop_dim: 9
  obs_mode: image
  vision_dim: 0
  chunk_size: 16
  pretrained_model_name_or_path: HuggingFaceTB/SmolVLM-256M-Instruct
  pretrained_variant: 256M
  pretrained_local_files_only: false
  # Keep SmolVLM attention-compatible, but narrow the action expert MLP.
  expert_intermediate_size: 384
  dtype: bfloat16

train:
  epochs: 100
  batch_size: 64
  lr: 0.0001
  lr_backbone: 0.00001
  lr_expert: 0.0001
  freeze_backbone_steps: 2000
  lr_scheduler: cosine
  scheduler_t_max: null
  scheduler_eta_min: 0.000001
  image_aug_enable: true
  image_aug_crop_scale: 0.92
  image_aug_brightness: 0.15
  image_aug_contrast: 0.15
  image_aug_saturation: 0.12
  action_noise_std: 0.01
  action_noise_clip: 0.0
  weight_decay: 0.0001
  num_workers: 64
  persistent_workers: true
  save_best: true
  save_best_min_delta: 0.0001
  grad_clip_norm: 1.0
  val_ratio: 0.1
  ema_decay: 0.999
  checkpoint_use_ema: true
  sim_eval_every_epochs: 20
  sim_eval_n_episodes: 100
  sim_eval_max_steps: 700
  sim_eval_record_grid: false
  save_best_success: true
  save_best_success_min_rate: 0.0
  model_print_depth: 2
  ckpt_dir: checkpoints
  device: auto

eval:
  checkpoint: checkpoints/best.pt
  action_stats_path: data/robomimic/custom/maniskill3_multiobject/ph/dataset_600_action_stats.json
  n_episodes: 50
  execute_steps: 4
  n_flow_steps: 6
  max_steps: 1000
  strict_parity: true
  action_smoothing_alpha: 0.10
  disable_domain_randomization: true
  vectorized: true
  num_envs: 8
  record: false
  record_grid: false
  grid_size: 3
  grid_fps: 20
  grid_width: 768
  grid_height: 768
  verbose: true
  log_every_episodes: 1
  device: auto

